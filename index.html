<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elsewhere &mdash; Travel Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0a0a;--ink-mid:#1c1c1c;--ink-soft:#2e2e2e;
  --paper:#f5f0e8;--paper-mid:#ede7d9;--paper-soft:#e4ddd0;
  --gold:#c9a84c;--gold-light:#e8d5a3;--gold-dim:#7a6330;
  --muted:#6b6355;--faint:#9b9185;--green:#2d6a4f;--red:#9b2226;
  --border:rgba(0,0,0,0.08);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'DM Sans',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:var(--ink);position:sticky;top:0;z-index:300;border-bottom:1px solid rgba(201,168,76,0.2)}
.hdr-in{max-width:1400px;margin:0 auto;padding:0 32px;height:60px;display:flex;align-items:center;gap:24px}
.wordmark{font-family:var(--font-d);font-size:24px;font-weight:300;letter-spacing:0.14em;color:var(--paper);text-transform:uppercase}
.wordmark em{font-style:italic;color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.upd{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint)}
.vtog{display:flex;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.vbtn{font-family:var(--font-b);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:6px 14px;border:none;background:transparent;color:var(--faint);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.vbtn.active{background:var(--gold);color:var(--ink)}

/* GLOBE VIEW */
#globe-view{position:relative;height:calc(100vh - 60px);background:var(--ink);display:flex;flex-direction:column;overflow:hidden}
#gcw{flex:1;position:relative;cursor:grab}
#gcw:active{cursor:grabbing}
#gc{width:100%;height:100%;display:block}

/* SLIDER */
.sldwrap{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.88));padding:24px 40px 28px;z-index:10}
.sldhdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.sldcur{font-family:var(--font-d);font-size:28px;font-weight:300;color:var(--paper);letter-spacing:-0.01em}
.sldcur em{font-style:italic;color:var(--gold-light)}
.sldcnt{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint)}
.sldtrk{position:relative;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;cursor:pointer}
.sldfil{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;pointer-events:none;transition:width .08s}
.sldthm{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--gold);border-radius:50%;border:2px solid var(--paper);box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:grab;transition:left .08s}
.sldmons{display:flex;justify-content:space-between;margin-top:10px}
.sldmon{font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(245,240,232,0.28);cursor:pointer;transition:color .15s}
.sldmon:hover,.sldmon.active{color:var(--gold)}

/* GLOBE PANEL */
.gpanel{position:absolute;top:20px;right:20px;width:340px;background:var(--paper);border-radius:4px;box-shadow:0 8px 48px rgba(0,0,0,0.45);overflow:hidden;transform:translateX(400px);transition:transform .35s cubic-bezier(.25,.46,.45,.94);z-index:20;max-height:calc(100vh - 120px);display:flex;flex-direction:column}
.gpanel.open{transform:translateX(0)}
.gp-accent{height:3px;flex-shrink:0}
.gp-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:rgba(0,0,0,0.06);border:none;border-radius:50%;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background .15s}
.gp-close:hover{background:rgba(0,0,0,0.12)}
.gp-main{padding:20px 22px 16px;overflow-y:auto}
.gp-dest{font-family:var(--font-d);font-size:28px;font-weight:400;line-height:1.05;color:var(--ink);letter-spacing:-0.01em;margin-bottom:2px}
.gp-event{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gp-dates{font-size:12px;color:var(--faint);margin-bottom:10px}
.gp-hook{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.gp-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.gp-tag{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:var(--paper-mid);color:var(--muted);border:1px solid var(--border)}
.gp-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pb{font-size:10px;letter-spacing:0.05em;padding:3px 9px;border-radius:2px;border:1px solid var(--border);color:var(--muted)}
.pb.warn{border-color:rgba(155,34,38,0.3);color:var(--red);background:rgba(155,34,38,0.04)}
.pb.deal{border-color:rgba(201,168,76,0.5);color:var(--gold-dim);background:rgba(201,168,76,0.08);font-weight:500}
.gp-dlink{display:inline-block;margin-top:8px;font-size:11px;letter-spacing:0.06em;color:var(--gold-dim);text-decoration:none;border-bottom:1px solid rgba(122,99,48,0.3)}
.gp-cost{border-top:1px solid var(--border);padding:16px 22px 20px;background:var(--paper-soft);flex-shrink:0}

/* SEASON LEGEND */
#season-legend{position:absolute;bottom:20px;left:24px;display:flex;gap:14px;flex-wrap:wrap;z-index:10;background:rgba(10,10,10,0.6);padding:10px 16px;border-radius:4px;border:1px solid rgba(255,255,255,0.07)}
.sl-item{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:rgba(245,240,232,0.6)}
.sl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#globe-hint{background:rgba(10,10,10,0.55);color:rgba(245,240,232,0.35);font-size:11px;letter-spacing:0.08em;text-align:center;padding:10px;border-top:1px solid rgba(255,255,255,0.05)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,10,10,0.7);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:24px}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--paper);border-radius:6px;width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s;box-shadow:0 24px 80px rgba(0,0,0,0.4)}
.modal-bg.open .modal{transform:translateY(0)}
.modal-accent{height:4px;flex-shrink:0}
.modal-scroll{overflow-y:auto;flex:1}
.modal-main{padding:28px 32px 20px}
.modal-eyebrow{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.modal-dest{font-family:var(--font-d);font-size:40px;font-weight:300;line-height:1;letter-spacing:-0.02em;color:var(--ink);margin-bottom:4px}
.modal-event{font-size:13px;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.modal-dates{font-size:13px;color:var(--faint);margin-bottom:14px}
.modal-hook{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:20px;font-family:var(--font-d);font-weight:300}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.modal-tag{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:var(--paper-mid);color:var(--muted);border:1px solid var(--border)}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.mbadge{font-size:10px;letter-spacing:0.05em;padding:4px 11px;border-radius:2px;border:1px solid var(--border);color:var(--muted)}
.mbadge.warn{border-color:rgba(155,34,38,0.3);color:var(--red);background:rgba(155,34,38,0.04)}
.mbadge.deal{border-color:rgba(201,168,76,0.5);color:var(--gold-dim);background:rgba(201,168,76,0.08);font-weight:500}
.modal-dlink{font-size:12px;color:var(--gold-dim);text-decoration:none;border-bottom:1px solid rgba(122,99,48,0.3);margin-left:auto}
.modal-cost{border-top:1px solid var(--border);padding:24px 32px 28px;background:var(--paper-soft)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;background:rgba(0,0,0,0.06);border:none;border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;z-index:10}
.modal-close:hover{background:rgba(0,0,0,0.12)}

/* COST SHARED */
.cost-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:14px;gap:2px}
.cost-seg{border-radius:2px}
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:12px}
.cost-row{display:flex;justify-content:space-between;font-size:12px;color:var(--faint)}
.cost-row span:last-child{font-weight:500;color:var(--muted)}
.cost-total-row{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;border-top:1px solid var(--border);margin-bottom:8px}
.cost-total-label{font-size:11px;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted)}
.cost-total-val{font-family:var(--font-d);font-size:32px;font-weight:300;color:var(--ink)}
.cost-notes{font-size:12px;color:var(--faint);font-style:italic;line-height:1.5}

/* LIST VIEW */
#list-view{display:none}

/* HERO */
.hero-wrap{padding:40px 32px 0;max-width:1400px;margin:0 auto}
.hero-eyebrow{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::after{content:'';display:block;width:32px;height:1px;background:var(--gold-dim)}
.hero-card{background:var(--ink);color:var(--paper);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;transition:transform .2s,box-shadow .2s}
.hero-card:hover{transform:translateY(-2px);box-shadow:0 16px 56px rgba(0,0,0,0.2)}
.hero-card-in{padding:40px 48px 44px;position:relative;z-index:1}
.hero-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 80% 50%,rgba(201,168,76,0.1) 0%,transparent 70%);pointer-events:none}
.hero-region{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.hero-pip{width:8px;height:8px;border-radius:50%}
.hero-region-name{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(245,240,232,0.45)}
.hero-event{font-family:var(--font-d);font-size:clamp(36px,5vw,60px);font-weight:300;line-height:1.0;letter-spacing:-0.02em;margin-bottom:8px}
.hero-event em{font-style:italic;color:var(--gold-light)}
.hero-dest{font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(245,240,232,0.5);margin-bottom:16px}
.hero-hook{font-size:16px;color:rgba(245,240,232,0.7);line-height:1.7;max-width:560px;margin-bottom:28px}
.hero-footer{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-badge{font-size:11px;letter-spacing:0.06em;padding:5px 13px;border-radius:2px;border:1px solid rgba(201,168,76,0.35);color:rgba(201,168,76,0.85)}
.hero-badge.warn{border-color:rgba(255,160,160,0.35);color:rgba(255,160,160,0.85)}
.hero-cta{margin-left:auto;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px}
.hero-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.hero-tag{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid rgba(201,168,76,0.2);color:rgba(201,168,76,0.55)}

/* FILTERS */
.filters-wrap{padding:28px 32px 0;max-width:1400px;margin:0 auto}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);margin-right:4px;flex-shrink:0}
.ftag{font-family:var(--font-b);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.ftag:hover{color:var(--ink);border-color:rgba(0,0,0,0.18)}
.ftag.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fmon{font-family:var(--font-b);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.fmon:hover{color:var(--ink);border-color:rgba(0,0,0,0.18)}
.fmon.active{background:var(--gold);color:var(--ink);border-color:var(--gold)}

/* CARD GRID */
.grid-wrap{padding:28px 32px 80px;max-width:1400px;margin:0 auto}
.week-section{margin-bottom:40px}
.week-hdr{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.week-dates{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);font-weight:500;white-space:nowrap}
.week-rule{flex:1;height:1px;background:var(--border)}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}}

/* CARDS */
.card{background:white;border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .15s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 36px rgba(0,0,0,0.1);border-color:rgba(0,0,0,0.12)}
.card.has-deal{border-color:var(--gold-dim)}
.card.has-deal::after{content:'DEAL';position:absolute;top:12px;right:12px;font-size:9px;letter-spacing:0.14em;font-weight:500;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:2px}
.card-acc{height:3px}
.card-body{padding:16px 18px 14px}
.card-top{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px}
.rpip{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-event-name{font-family:var(--font-d);font-size:20px;font-weight:400;line-height:1.1;color:var(--ink);letter-spacing:-0.01em}
.card-dest-name{font-size:11px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.card-hook{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px}
.card-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cbadge{font-size:10px;letter-spacing:0.04em;padding:2px 8px;border-radius:2px;border:1px solid var(--border);color:var(--faint)}
.cbadge.warn{border-color:rgba(155,34,38,0.25);color:var(--red)}
.cbadge.deal{border-color:rgba(201,168,76,0.45);color:var(--gold-dim);background:rgba(201,168,76,0.07);font-weight:500}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.ctag{font-size:9px;letter-spacing:0.07em;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:var(--paper-soft);color:var(--faint);border:1px solid var(--border)}

/* EMPTY */
.empty-state{text-align:center;padding:80px 0;color:var(--faint)}
.empty-word{font-family:var(--font-d);font-size:28px;font-weight:300;font-style:italic}

/* ANIMATIONS */
.week-section{opacity:0;transform:translateY(10px);animation:fu .45s forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="wordmark">Els<em>e</em>where</div>
    <div class="hdr-right">
      <span class="upd" id="last-updated"></span>
      <div class="vtog">
        <button class="vbtn active" id="btn-globe" onclick="setView('globe')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Globe
        </button>
        <button class="vbtn" id="btn-list" onclick="setView('list')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          List
        </button>
      </div>
    </div>
  </div>
</header>

<!-- GLOBE VIEW -->
<div id="globe-view">
  <div id="gcw"><canvas id="gc"></canvas>
    <!-- Season legend -->
    <div id="season-legend">
      <div class="sl-item"><span class="sl-dot" style="background:#f5c842"></span>Spring</div>
      <div class="sl-item"><span class="sl-dot" style="background:#4caf7d"></span>Summer</div>
      <div class="sl-item"><span class="sl-dot" style="background:#e07340"></span>Autumn</div>
      <div class="sl-item"><span class="sl-dot" style="background:#5b9bd5"></span>Winter</div>
      <div class="sl-item sl-deal"><span class="sl-dot" style="background:#e040fb;border:2px solid #fff"></span>Active deal</div>
    </div>
    <!-- Detail panel -->
    <div class="gpanel" id="gpanel">
      <div class="gp-accent" id="gp-accent"></div>
      <button class="gp-close" onclick="closeGPanel()">&#x2715;</button>
      <div class="gp-main" id="gp-main"></div>
      <div class="gp-cost" id="gp-cost"></div>
    </div>
  </div>
  <!-- Hint bar -->
  <div id="globe-hint">Drag to rotate &nbsp;&middot;&nbsp; Click a pin to explore</div>
</div>

<!-- LIST VIEW -->
<div id="list-view">
  <!-- Hero -->
  <div class="hero-wrap">
    <div class="hero-eyebrow">Top pick &mdash; book now for 6 months out</div>
    <div class="hero-card" id="hero-card" onclick="openModal(heroEntry)">
      <div class="hero-card-in" id="hero-card-in">
        <div class="loading-word" style="font-family:var(--font-d);font-size:28px;font-weight:300;font-style:italic;color:rgba(245,240,232,0.4)">Loading&hellip;</div>
      </div>
    </div>
  </div>
  <!-- Filters -->
  <div class="filters-wrap">
    <div class="filter-row">
      <span class="filter-label">Type</span>
      <button class="ftag active" data-tag="all">All</button>
      <button class="ftag" data-tag="festival">Festival</button>
      <button class="ftag" data-tag="nature">Nature</button>
      <button class="ftag" data-tag="food">Food</button>
      <button class="ftag" data-tag="nightlife">Nightlife</button>
      <button class="ftag" data-tag="culture">Culture</button>
      <button class="ftag" data-tag="adventure">Adventure</button>
      <button class="ftag" data-tag="sports">Sports</button>
      <button class="ftag" data-tag="wellness">Wellness</button>
    </div>
    <div class="filter-row" id="month-filters">
      <span class="filter-label">Month</span>
    </div>
  </div>
  <!-- Grid -->
  <div class="grid-wrap" id="grid-wrap">
    <div class="empty-state"><div class="empty-word">Loading&hellip;</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div class="modal-accent" id="modal-accent"></div>
    <div class="modal-scroll">
      <div class="modal-main" id="modal-main"></div>
      <div class="modal-cost" id="modal-cost" style="display:none"></div>
    </div>
  </div>
</div>

<script>
var SHEET_ID='1t-lDfHKAXXOclTGVLn4nV0Nz3Cm6Py9VO6wS-4Uf_As';
var CALENDAR_GID='73191465', DEALS_GID='0', META_GID='965724304';
var DEAL_DAYS_BACK=7;
var calendarData=[], dealsData=[], allWeeks=[];
var activeTag='all', activeMonth='all';
var heroEntry=null;

// -- FETCH --
function csvUrl(gid){return'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+gid}
function parseCSV(text){
  var lines=text.trim().split('\n');if(lines.length<2)return[];
  var headers=splitLine(lines[0]),rows=[];
  for(var i=1;i<lines.length;i++){var v=splitLine(lines[i]),o={};headers.forEach(function(h,j){o[h.trim()]=(v[j]||'').trim()});rows.push(o)}
  return rows;
}
function splitLine(line){
  var r=[],cur='',q=false;
  for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(c===','&&!q){r.push(cur);cur=''}else cur+=c}
  r.push(cur);return r;
}
async function fetchTab(gid){var res=await fetch(csvUrl(gid));if(!res.ok)throw new Error('HTTP '+res.status+' - Share the Sheet publicly');return parseCSV(await res.text())}

// -- INIT --
async function init(){
  try{
    var res=await Promise.all([fetchTab(CALENDAR_GID),fetchTab(DEALS_GID),fetchTab(META_GID)]);
    calendarData=res[0].filter(function(r){return r.destination&&r.destination.length>0});
    dealsData=res[1].filter(function(r){return r.matchFound==='TRUE'&&r.matchScore==='high'});
    var meta=res[2];
    var cm=meta.find(function(r){return r.key==='lastCalendarRefresh'});
    if(cm&&cm.value){var d=new Date(cm.value);document.getElementById('last-updated').textContent='Updated '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
    buildWeekIndex();
    buildMonthFilters();
    pickHero();
    renderGrid();
    initGlobe();
  }catch(e){console.error(e);showError(e.message)}
}

function buildWeekIndex(){
  var seen={};allWeeks=[];
  calendarData.forEach(function(r){
    var k=(r.month||'')+'__'+(r.weekLabel||'');
    if(!seen[k]){seen[k]=true;allWeeks.push({month:r.month,weekLabel:r.weekLabel})}
  });
}

function buildMonthFilters(){
  var months=[],seen={};
  calendarData.forEach(function(r){if(r.month&&!seen[r.month]){seen[r.month]=true;months.push(r.month)}});
  var row=document.getElementById('month-filters');
  months.forEach(function(m){
    var b=document.createElement('button');
    b.className='fmon';b.dataset.month=m;
    b.textContent=m.substring(0,3);
    b.onclick=function(){
      document.querySelectorAll('.fmon').forEach(function(x){x.classList.remove('active')});
      if(activeMonth===m){activeMonth='all';b.classList.remove('active')}
      else{activeMonth=m;b.classList.add('active')}
      renderGrid();
      var el=document.getElementById('month-'+m.toLowerCase());
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    };
    row.appendChild(b);
  });
}

// -- HERO: pick top destination ~6 months from now --
function pickHero(){
  var now=new Date();
  var target=new Date(now.getFullYear(),now.getMonth()+6,1);
  var targetMonth=target.toLocaleString('en-US',{month:'long'});

  // Try to find an entry in the target month; fall back to nearest
  var candidates=calendarData.filter(function(r){return r.month===targetMonth});
  if(!candidates.length) candidates=calendarData;

  // Prefer deals, then bookAhead, then first entry
  var deal=candidates.find(function(r){return findDeal(r)});
  heroEntry=deal||candidates.find(function(r){return r.bookAhead==='TRUE'})||candidates[0];
  if(!heroEntry)return;

  var accent=RA[heroEntry.region]||'linear-gradient(90deg,#333,#555)';
  var color=RC[heroEntry.region]||'#888';
  var d=findDeal(heroEntry);
  var tags=parseTags(heroEntry.tags);

  var html='<div class="hero-region"><div class="hero-pip" style="background:'+color+'"></div><span class="hero-region-name">'+(heroEntry.region||'').toUpperCase()+'</span></div>'
    +'<div class="hero-event">'+escHtml(heroEntry.event||heroEntry.destination||'')+'</div>'
    +'<div class="hero-dest">'+escHtml(heroEntry.destination||'')+'</div>'
    +'<div class="hero-hook">'+escHtml(heroEntry.hook||'')+'</div>'
    +'<div class="hero-footer">'
    +(heroEntry.eventDates?'<span class="hero-badge">'+escHtml(heroEntry.eventDates)+'</span>':'')
    +(heroEntry.bookAhead==='TRUE'?'<span class="hero-badge warn">Book ahead</span>':'')
    +(d?'<span class="hero-badge">'+escHtml(d.price||'')+' from LAX</span>':'')
    +'<span class="hero-cta">Explore &rarr;</span>'
    +'</div>'
    +(tags.length?'<div class="hero-tags">'+tags.map(function(t){return'<span class="hero-tag">'+t+'</span>'}).join('')+'</div>':'');

  var el=document.getElementById('hero-card-in');
  el.innerHTML=html;
  document.getElementById('hero-card').style.background=
    'linear-gradient(135deg, var(--ink) 0%, #1a2535 100%)';
}

// -- GRID RENDER --
function getFiltered(){
  return calendarData.filter(function(r){
    var tagOk=activeTag==='all'||parseTags(r.tags).indexOf(activeTag)>=0;
    var monOk=activeMonth==='all'||r.month===activeMonth;
    return tagOk&&monOk;
  });
}

function renderGrid(){
  var wrap=document.getElementById('grid-wrap');
  var filtered=getFiltered();
  if(!filtered.length){wrap.innerHTML='<div class="empty-state"><div class="empty-word">No destinations match.</div></div>';return}

  // Group by month then pair weeks: show 8 cards (2 weeks) per row section
  var byMonth={};
  filtered.forEach(function(r){
    var m=r.month||'Unknown';
    if(!byMonth[m])byMonth[m]={};
    var w=r.weekLabel||'';
    if(!byMonth[m][w])byMonth[m][w]=[];
    byMonth[m][w].push(r);
  });

  var html='';var delay=0;
  Object.keys(byMonth).forEach(function(month){
    var weeks=Object.keys(byMonth[month]);
    // Pair weeks: group by 2
    for(var wi=0;wi<weeks.length;wi+=2){
      var w1=weeks[wi],w2=weeks[wi+1];
      var entries=byMonth[month][w1].concat(w2?byMonth[month][w2]:[]);
      var label=w1+(w2?' &mdash; '+w2:'');
      html+='<div class="week-section" id="month-'+month.toLowerCase()+'" style="animation-delay:'+delay+'ms">'
        +'<div class="week-hdr"><span class="week-dates">'+month+' &mdash; '+label+'</span><div class="week-rule"></div></div>'
        +'<div class="card-grid">';
      entries.forEach(function(entry){
        var deal=findDeal(entry);
        var color=RC[entry.region]||'#888';
        var accent=RA[entry.region]||'linear-gradient(90deg,#888,#aaa)';
        var tags=parseTags(entry.tags);
        html+='<div class="card'+(deal?' has-deal':'')+'" onclick="openModal(calendarData['+calendarData.indexOf(entry)+'])">'
          +'<div class="card-acc" style="background:'+accent+'"></div>'
          +'<div class="card-body">'
          +'<div class="card-top"><div class="rpip" style="background:'+color+'"></div>'
          +'<div><div class="card-event-name">'+escHtml(entry.event||entry.destination||'')+'</div>'
          +'<div class="card-dest-name">'+escHtml(entry.destination||'')+'</div></div></div>'
          +'<div class="card-hook">'+escHtml(entry.hook||'')+'</div>'
          +'<div class="card-foot">'
          +(entry.eventDates?'<span class="cbadge">'+escHtml(entry.eventDates)+'</span>':'')
          +(entry.bookAhead==='TRUE'?'<span class="cbadge warn">Book ahead</span>':'')
          +(deal?'<span class="cbadge deal">'+escHtml(deal.price||'')+' from LAX</span>':'')
          +'</div>'
          +(tags.length?'<div class="card-tags">'+tags.map(function(t){return'<span class="ctag">'+t+'</span>'}).join('')+'</div>':'')
          +'</div></div>';
      });
      html+='</div></div>';
      delay+=40;
    }
  });
  wrap.innerHTML=html;
}

function openModal(entry){
  if(!entry)return;
  var accent=RA[entry.region]||'linear-gradient(90deg,#333,#555)';
  var deal=findDeal(entry);
  var tags=parseTags(entry.tags);

  document.getElementById('modal-accent').style.background=accent;

  document.getElementById('modal-main').innerHTML=
    '<div class="modal-eyebrow">'+escHtml((entry.region||'').toUpperCase())+' &mdash; '+escHtml(entry.weekLabel||'')+'</div>'
    +'<div class="modal-dest">'+escHtml(entry.destination||'')+'</div>'
    +'<div class="modal-event">'+escHtml(entry.event||'')+'</div>'
    +(entry.eventDates?'<div class="modal-dates">'+escHtml(entry.eventDates)+'</div>':'')
    +'<div class="modal-hook">'+escHtml(entry.hook||'')+'</div>'
    +(tags.length?'<div class="modal-tags">'+tags.map(function(t){return'<span class="modal-tag">'+t+'</span>'}).join('')+'</div>':'')
    +'<div class="modal-badges">'
    +(entry.bookAhead==='TRUE'?'<span class="mbadge warn">Book ahead</span>':'')
    +(deal?'<span class="mbadge deal">'+escHtml(deal.price||'')+' from LAX</span>':'')
    +(deal&&deal.permalink?'<a href="'+deal.permalink+'" class="modal-dlink" target="_blank">View deal &rarr;</a>':'')

  var costHtml=buildCostHtml(entry);
  var costEl=document.getElementById('modal-cost');
  if(costHtml){costEl.innerHTML=costHtml;costEl.style.display='block'}
  else costEl.style.display='none';

  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow=''}
function handleModalBgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal()}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

// -- COST HTML --
function buildCostHtml(entry){
  var f=parseFloat(entry.flightCost)||0,h=parseFloat(entry.housingCost)||0;
  var fo=parseFloat(entry.foodCost)||0,ex=parseFloat(entry.experientialCost)||0;
  var tot=parseFloat(entry.totalCost)||(f+h+fo+ex);
  if(!tot)return'';
  var pF=Math.round(f/tot*100),pH=Math.round(h/tot*100),pFo=Math.round(fo/tot*100),pE=100-pF-pH-pFo;
  return'<div class="cost-bar">'
    +'<div class="cost-seg" style="width:'+pF+'%;background:#4a7fc1"></div>'
    +'<div class="cost-seg" style="width:'+pH+'%;background:#c47c3a"></div>'
    +'<div class="cost-seg" style="width:'+pFo+'%;background:#3a8a5c"></div>'
    +'<div class="cost-seg" style="width:'+pE+'%;background:#8a6c2a"></div>'
    +'</div>'
    +'<div class="cost-grid">'
    +'<div class="cost-row"><span>Flight (LAX)</span><span>'+fmt(f)+'</span></div>'
    +'<div class="cost-row"><span>Housing &middot; 12 nights</span><span>'+fmt(h)+'</span></div>'
    +'<div class="cost-row"><span>Food & drink</span><span>'+fmt(fo)+'</span></div>'
    +'<div class="cost-row"><span>Experiences</span><span>'+fmt(ex)+'</span></div>'
    +'</div>'
    +'<div class="cost-total-row"><span class="cost-total-label">12-day estimate</span><span class="cost-total-val">'+fmt(tot)+'</span></div>'
    +(entry.costNotes?'<div class="cost-notes">'+escHtml(entry.costNotes)+'</div>':'');
}

// -- HELPERS --
function findDeal(entry){
  var dest=(entry.destination||'').toLowerCase();
  return dealsData.find(function(d){
    var dd=(d.destination||'').toLowerCase(),dc=(d.country||'').toLowerCase();
    return dest.includes(dd)||dd.includes(dest.split(',')[0].trim())||dest.includes(dc);
  });
}
function parseTags(str){
  if(!str)return[];
  try{var t=JSON.parse(str.replace(/'/g,'"'));return Array.isArray(t)?t:[]}catch(e){return[]}
}
function fmt(n){return'$'+Math.round(n).toLocaleString()}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showError(msg){
  document.getElementById('grid-wrap').innerHTML='<div class="empty-state"><div class="empty-word" style="font-size:18px">Could not load calendar</div><p style="font-size:13px;color:var(--muted);margin-top:8px">'+escHtml(msg)+'</p><ol style="font-size:13px;color:var(--muted);margin-top:12px;padding-left:20px;line-height:2"><li>Open your <a href="https://docs.google.com/spreadsheets/d/'+SHEET_ID+'" target="_blank" style="color:var(--gold-dim)">Google Sheet</a></li><li>Click Share &rarr; Anyone with the link &rarr; Viewer</li><li>Reload</li></ol></div>';
  setView('list');
}

function getCoords(dest){
  var d=(dest||'').toLowerCase();
  for(var k in COORDS){if(d.includes(k))return COORDS[k]}
  return null;
}
function ll2v3(lat,lon,r){
  var phi=(90-lat)*Math.PI/180,theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}

function initGlobe(){
  globeCanvas=document.getElementById('gc');
  var wrap=document.getElementById('gcw');
  var W=wrap.clientWidth,H=wrap.clientHeight;

  globeScene=new THREE.Scene();
  globeCamera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  globeCamera.position.z=2.6;

  globeRenderer=new THREE.WebGLRenderer({canvas:globeCanvas,antialias:true,alpha:true});
  globeRenderer.setSize(W,H);
  globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  globeRenderer.setClearColor(0x060d15,1);

  // Lighting - sun from upper right
  var al=new THREE.AmbientLight(0x8aaabb,0.5);globeScene.add(al);
  var sun=new THREE.DirectionalLight(0xfff5e0,2.2);sun.position.set(6,3,4);globeScene.add(sun);
  var fill=new THREE.DirectionalLight(0x2255aa,0.3);fill.position.set(-4,-2,-3);globeScene.add(fill);

  globeGroup=new THREE.Group();globeScene.add(globeGroup);

  // Load real Earth texture from NASA Blue Marble (public domain)
  var loader=new THREE.TextureLoader();
  loader.crossOrigin='anonymous';

  // Use a reliable public Earth texture
  var earthTexUrl='https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_atmos_2048.jpg';
  var specTexUrl='https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_specular_2048.jpg';
  var bumpTexUrl='https://raw.githubusercontent.com/mrdoob/three.js/r128/examples/textures/planets/earth_normal_2048.jpg';

  // Load earth with texture, fall back to procedural if CORS fails
  loader.load(earthTexUrl,
    function(tex){
      loader.load(specTexUrl, function(spec){
        loader.load(bumpTexUrl, function(bump){
          buildEarth(tex, spec, bump);
        }, null, function(){ buildEarth(tex, spec, null); });
      }, null, function(){ buildEarth(tex, null, null); });
    },
    null,
    function(){ buildEarthFallback(); }
  );

  // Starfield background
  var stars=[];
  for(var i=0;i<2000;i++){
    var theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
    var r=80+Math.random()*20;
    stars.push(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
  }
  var sg=new THREE.BufferGeometry();
  sg.setAttribute('position',new THREE.Float32BufferAttribute(stars,3));
  var sm=new THREE.PointsMaterial({color:0xffffff,size:0.18,transparent:true,opacity:0.7});
  globeScene.add(new THREE.Points(sg,sm));

  raycaster=new THREE.Raycaster();
  mouse3=new THREE.Vector2();
  addGlobeEvents();
  animateGlobe();

  window.addEventListener('resize',function(){
    var W2=wrap.clientWidth,H2=wrap.clientHeight;
    globeCamera.aspect=W2/H2;
    globeCamera.updateProjectionMatrix();
    globeRenderer.setSize(W2,H2);
  });
}

function buildEarth(tex, spec, bump){
  var mat=new THREE.MeshPhongMaterial({
    map:tex,
    specularMap: spec||null,
    bumpMap: bump||null,
    bumpScale: bump?0.05:0,
    specular: spec?new THREE.Color(0x333333):new THREE.Color(0x111111),
    shininess: spec?25:8,
  });
  var mesh=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),mat);
  globeGroup.add(mesh);

  // Atmosphere
  var atm=new THREE.Mesh(
    new THREE.SphereGeometry(1.025,64,64),
    new THREE.MeshPhongMaterial({color:0x4488cc,transparent:true,opacity:0.1,side:THREE.BackSide})
  );
  globeGroup.add(atm);

  // Cloud layer (subtle)
  var cloudMat=new THREE.MeshPhongMaterial({color:0xffffff,transparent:true,opacity:0.07,depthWrite:false});
  var clouds=new THREE.Mesh(new THREE.SphereGeometry(1.012,64,64),cloudMat);
  globeGroup.add(clouds);

  buildAllPins();
}

function buildEarthFallback(){
  // Procedural fallback: ocean + land colors via vertex shader approach
  var mat=new THREE.MeshPhongMaterial({color:0x1a5276,shininess:30,specular:new THREE.Color(0x2e86c1)});
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1,64,64),mat));
  // Grid lines for orientation
  var gm=new THREE.LineBasicMaterial({color:0x1e5070,transparent:true,opacity:0.6});
  for(var lat=-60;lat<=60;lat+=30){var pts=[];for(var lo=0;lo<=360;lo+=3)pts.push(ll2v3(lat,lo-180,1.003));globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gm))}
  for(var lo2=-180;lo2<=180;lo2+=30){var pts2=[];for(var la=-90;la<=90;la+=3)pts2.push(ll2v3(la,lo2,1.003));globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2),gm))}
  buildAllPins();
}

function buildAllPins(){
  // Show ALL destinations, color-coded by season
  calendarData.forEach(function(entry,idx){
    var coords=getCoords(entry.destination);
    if(!coords)return;
    var deal=findDeal(entry);
    var seasonCol=SEASON_COLORS[entry.month]||0x888888;
    var col=deal?0xe040fb:seasonCol;
    var pos=ll2v3(coords[0],coords[1],1.02);
    var size=deal?0.030:0.022;

    var pm=new THREE.Mesh(
      new THREE.SphereGeometry(size,10,10),
      new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:deal?0.8:0.5})
    );
    pm.position.copy(pos);
    globeGroup.add(pm);
    pinMeshes.push(pm);
    pinData.push(entry);

    // Halo for deals
    if(deal){
      var hm=new THREE.Mesh(
        new THREE.RingGeometry(0.034,0.044,24),
        new THREE.MeshBasicMaterial({color:0xe040fb,transparent:true,opacity:0.4,side:THREE.DoubleSide})
      );
      hm.position.copy(pos);hm.lookAt(pos.clone().multiplyScalar(2));
      globeGroup.add(hm);
    }
  });
}

function addGlobeEvents(){
  var wrap=document.getElementById('gcw');
  wrap.addEventListener('mousedown',function(e){
    isDragging=false;prevMouse={x:e.clientX,y:e.clientY};
    function onDrag(e){isDragging=true;autoRotate=false;var dx=(e.clientX-prevMouse.x)*0.005,dy=(e.clientY-prevMouse.y)*0.005;globeGroup.rotation.y+=dx;globeGroup.rotation.x=Math.max(-1.2,Math.min(1.2,globeGroup.rotation.x+dy));prevMouse={x:e.clientX,y:e.clientY}}
    function onUp(e){wrap.removeEventListener('mousemove',onDrag);wrap.removeEventListener('mouseup',onUp);if(!isDragging)handleGlobeClick(e);isDragging=false}
    wrap.addEventListener('mousemove',onDrag);wrap.addEventListener('mouseup',onUp);
  });
  wrap.addEventListener('touchstart',function(e){isDragging=false;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
  wrap.addEventListener('touchmove',function(e){isDragging=true;autoRotate=false;var dx=(e.touches[0].clientX-prevMouse.x)*0.005,dy=(e.touches[0].clientY-prevMouse.y)*0.005;globeGroup.rotation.y+=dx;globeGroup.rotation.x=Math.max(-1.2,Math.min(1.2,globeGroup.rotation.x+dy));prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:true});
  // Scroll to zoom
  wrap.addEventListener('wheel',function(e){
    e.preventDefault();
    globeCamera.position.z=Math.max(1.6,Math.min(4.5,globeCamera.position.z+e.deltaY*0.002));
  },{passive:false});
}

function handleGlobeClick(e){
  var rect=globeCanvas.getBoundingClientRect();
  mouse3.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse3.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse3,globeCamera);
  raycaster.params.Points={threshold:0.08};
  raycaster.params.Mesh={threshold:0.01};
  var spheres=pinMeshes.filter(function(m){return m.geometry&&m.geometry.type==='SphereGeometry'});
  var hits=raycaster.intersectObjects(spheres);
  if(hits.length){
    var idx=spheres.indexOf(hits[0].object);
    if(pinData[idx])openGPanel(pinData[idx]);
  }else{
    closeGPanel();autoRotate=true;
  }
}

function flyTo(lat,lon){
  var ty=-(lon*Math.PI/180)-Math.PI,tx=lat*Math.PI/180*-0.55;
  var sy=globeGroup.rotation.y,sx=globeGroup.rotation.x,t=0;
  function step(){t+=0.04;if(t>1)return;var ease=1-Math.pow(1-t,3);globeGroup.rotation.y=sy+(ty-sy)*ease;globeGroup.rotation.x=sx+(tx-sx)*ease;requestAnimationFrame(step)}
  step();
}

function animateGlobe(){
  requestAnimationFrame(animateGlobe);
  if(autoRotate)globeGroup.rotation.y+=0.0012;
  pinPulse+=0.04;
  // Pulse all pins - deals pulse bigger and faster
  pinMeshes.forEach(function(m,i){
    if(m.geometry&&m.geometry.type==='SphereGeometry'){
      var entry=pinData[i];
      if(entry&&findDeal(entry)){
        var s=1+0.28*Math.sin(pinPulse*1.8+i);
        m.scale.setScalar(s);
      } else {
        var s2=1+0.08*Math.sin(pinPulse*0.7+i*1.3);
        m.scale.setScalar(s2);
      }
    }
  });
  globeRenderer.render(globeScene,globeCamera);
}
init();
</script>
